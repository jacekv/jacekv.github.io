{% comment %}
Minima includes this file inside the document <head>. We use it to load
MathJax only on pages that opt in via `math: true` in front matter (or
`site.math` globally).
{% endcomment %}
{% if page.math or site.math %}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [["\\(", "\\)"], ["$", "$"]],
      displayMath: [["$$", "$$"], ["\\[", "\\]"]],
      processEscapes: true
    },
    svg: { fontCache: "global" }
  };
</script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
</script>
{% endif %}
